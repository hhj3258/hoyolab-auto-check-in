name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $out = "hoyolab-auto-check-in-$tag.zip"
          $include = @("run.bat", "schedule.bat", "scripts", "locales", "README.md", "README.ko.md", "LICENSE")
          Compress-Archive -Path $include -DestinationPath $out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          body_path: .github/RELEASE_NOTES.md
